<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grile Licență ULBS</title>
<style>
  :root { 
    --bg:#050505; --card:#0f0f12; --accent:#3b82f6; 
    --correct:#22c55e; --wrong:#ef4444; --text:#f8fafc;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; padding: 20px; }
  .wrap { max-width: 650px; margin: auto; }
  
  .sticky-header {
    position: sticky; top: 0; background: var(--bg); padding: 10px 0;
    z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  
  .progress-container { background: #1f2937; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
  .progress-bar { background: var(--accent); height: 100%; width: 0%; transition: width 0.4s ease; }
  
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .btn-nav { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 8px 16px; margin: 4px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 13px; }
  .btn-nav.active { background: var(--accent); border-color: var(--accent); }
  .btn-reset { background: #374151; color: #fff; border: none; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }

  .question-card { 
    background: var(--card); border: 1px solid rgba(255,255,255,0.1); 
    padding: 24px; border-radius: 16px; margin-bottom: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    animation: fadeIn 0.4s ease-out forwards;
  }
  
  .opt-btn { 
    width: 100%; text-align: left; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1); color: var(--text); 
    padding: 14px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; 
    transition: all 0.2s ease;
  }
  .opt-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: var(--accent); }
  
  .correct-ans { background: rgba(34,197,94,0.15) !important; border-color: var(--correct) !important; }
  .wrong-ans { background: rgba(239,68,68,0.15) !important; border-color: var(--wrong) !important; }
  
  .feedback { margin-top: 15px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; border-left: 4px solid var(--accent); font-size: 14px; }
  .final-score { text-align: center; padding: 40px; background: var(--card); border-radius: 16px; border: 1px solid var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <div class="sticky-header">
    <h1 style="text-align:center; margin:0 0 15px; font-size: 24px;">Grile Licență</h1>
    <div id="nav" style="display:flex; justify-content:center; flex-wrap:wrap;"></div>
    
    <div id="progressBox" style="margin-top: 15px;">
      <div style="display:flex; justify-content:space-between; align-items:center; font-size:14px;">
        <span id="counterText">0 din 0</span>
        <button class="btn-reset" onclick="render()">Reset Test</button>
      </div>
      <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
    </div>
  </div>

  <div id="app" style="margin-top:20px;"></div>
</div>
<script src="data.js"></script>
<script>
  let currentKey = "management", score = 0, answered = 0;
  const allQuestions = [...Object.values(QUIZ_DATA).flatMap(s => s.questions)];
  
  function getQuestionsForCurrent() {
    if (currentKey === "mix50") return [...allQuestions].sort(() => Math.random() - 0.5).slice(0, 50);
    if (currentKey === "mix200") return [...allQuestions].sort(() => Math.random() - 0.5);
    return QUIZ_DATA[currentKey].questions;
  }

  function updateProgress() {
    const total = getQuestionsForCurrent().length;
    const percent = (answered / total) * 100;
    document.getElementById("counterText").innerText = `${answered} din ${total} întrebări`;
    document.getElementById("progressBar").style.width = `${percent}%`;
  }

  function render() {
    score = 0; answered = 0;
    const navItems = [...Object.keys(QUIZ_DATA), "mix50", "mix200"];
    document.getElementById("nav").innerHTML = navItems.map(k => 
      `<button class="btn-nav ${k===currentKey?'active':''}" onclick="setSub('${k}')">${k === "mix50" ? "Mix 50" : k === "mix200" ? "Mix 200" : QUIZ_DATA[k].label}</button>`).join('');
    
    updateProgress();
    const qs = getQuestionsForCurrent();
    document.getElementById("app").innerHTML = qs.map((q, i) => `
      <div class="question-card" id="q${i}">
        <div style="font-size:17px; margin-bottom:12px;"><strong>${i+1}.</strong> ${q.q}</div>
        ${q.o.map((o, oi) => `<button class="opt-btn" onclick="check(${i}, ${oi})">${String.fromCharCode(65+oi)}. ${o}</button>`).join('')}
      </div>`).join('');
  }

  function setSub(k) { currentKey = k; render(); }

  function check(qIdx, oIdx) {
    const qs = getQuestionsForCurrent();
    const q = qs[qIdx];
    const card = document.getElementById(`q${qIdx}`);
    if(card.querySelector('.feedback')) return;
    
    answered++; if(oIdx === q.a) score++;
    updateProgress();
    
    card.querySelectorAll('.opt-btn').forEach((b, i) => {
      b.disabled = true;
      if(i === q.a) b.classList.add('correct-ans');
      if(i === oIdx && i !== q.a) b.classList.add('wrong-ans');
    });
    
    card.innerHTML += `<div class="feedback"><strong>${oIdx === q.a ? '✓ Corect' : '✗ Greșit'}</strong><br>
      <span style="color:var(--correct)">Răspuns corect: ${String.fromCharCode(65+q.a)}</span><br>
      <em>Motivație: ${q.m || 'Fără explicație'}</em></div>`;

    if(answered === qs.length) {
      document.getElementById("app").innerHTML = `
        <div class="final-score">
          <h2>Test Finalizat!</h2>
          <p>Ai obținut <strong>${score}</strong> puncte din <strong>${answered}</strong> întrebări.</p>
          <button class="btn-nav" onclick="render()">Reia Testul</button>
        </div>`;
    }
  }
  render();
</script>
</body>
</html>
