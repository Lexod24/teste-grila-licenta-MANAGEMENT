<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grile Management</title>
<style>
  :root{
    --bg:#0F1110; --bg-soft:#171A18; --card:#1C1F1D; --card-hover:#23271F;
    --line:#2C302C; --ink:#EDEAE0; --ink-dim:#9A9C92; --ink-faint:#6B6E64;
    --accent:#D7FF3F; --accent-ink:#0F1110;
    --correct:#7FD858; --correct-bg:rgba(127,216,88,0.10); --correct-border:rgba(127,216,88,0.4);
    --wrong:#FF6B5E; --wrong-bg:rgba(255,107,94,0.10); --wrong-border:rgba(255,107,94,0.4);
    --radius-md:12px; --radius-sm:8px;
    --display:"Fjalla One","Arial Narrow",sans-serif;
    --serif:"Lora",Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"JetBrains Mono",Consolas,Menlo,monospace;
  }
  *{box-sizing:border-box;}
  body{background:var(--bg); color:var(--ink); font-family:var(--sans); margin:0; min-height:100vh;}
  .wrap{max-width:780px; margin:0 auto; padding:0 20px 90px;}
  header.masthead{padding:44px 0 28px;}
  h1.title{font-family:var(--display); font-size:52px; margin:0; color:var(--ink);}
  .accent-word{color:var(--accent);}
  .question-card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius-md); margin-bottom:14px; padding:20px;}
  .q-text{font-family:var(--serif); font-size:19px; line-height:1.55; margin-bottom:20px;}
  .opt-btn{text-align:left; background:var(--bg-soft); border:1px solid var(--line); border-radius:var(--radius-sm); padding:13px 16px; margin-bottom:9px; width:100%; cursor:pointer; color:var(--ink); display:flex; gap:11px;}
  .opt-btn:hover:not(:disabled){background:#262A24;}
  .opt-btn:disabled{cursor:default;}
  .correct-answer{background:var(--correct-bg)!important; border-color:var(--correct-border)!important;}
  .wrong-selected{background:var(--wrong-bg)!important; border-color:var(--wrong-border)!important;}
  .q-feedback{font-family:var(--mono); font-size:14px; padding-top:10px;}
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <h1 class="title">Grile <span class="accent-word">licență</span></h1>
  </header>
  <main id="questionList"></main>
</div>

<script src="data.js"></script>
<script>
(function(){
  const LETTERS = ["A","B","C","D"];
  const STORAGE_KEY = "ulbs_grile_progress_v3";
  let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { answers: {} };

  function renderQuestions(){
    const list = document.getElementById("questionList");
    list.innerHTML = "";
    
    // Luăm întrebările dintr-o disciplină (exemplu: management)
    const questions = QUIZ_DATA.management.questions;

    questions.forEach((q, qIdx) => {
      // 1. Pregătim opțiunile cu eticheta corectitudinii[cite: 1]
      let optionsWithIndices = q.o.map((text, idx) => ({ text, isOriginalCorrect: idx === q.a }));

      // 2. Amestecăm opțiunile (Fisher-Yates)[cite: 1]
      for (let i = optionsWithIndices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [optionsWithIndices[i], optionsWithIndices[j]] = [optionsWithIndices[j], optionsWithIndices[i]];
      }

      const card = document.createElement("article");
      card.className = "question-card";
      card.innerHTML = `<div class="q-text">${q.q}</div>`;

      const userAnswer = state.answers[qIdx];
      const isAnswered = userAnswer !== undefined;

      optionsWithIndices.forEach((opt, optIdx) => {
        const btn = document.createElement("button");
        btn.className = "opt-btn";
        btn.innerHTML = `<span style="font-family:var(--mono); color:var(--ink-faint)">${LETTERS[optIdx]}</span><span>${opt.text}</span>`;

        if(isAnswered){
          btn.disabled = true;
          if(opt.isOriginalCorrect) btn.classList.add("correct-answer");
          else if(optIdx === userAnswer) btn.classList.add("wrong-selected");
        } else {
          btn.addEventListener("click", () => {
            // Identificăm indexul original pentru a valida[cite: 1]
            const originalIdx = q.o.indexOf(opt.text);
            state.answers[qIdx] = originalIdx;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            renderQuestions();
          });
        }
        card.appendChild(btn);
      });
      list.appendChild(card);
    });
  }
  renderQuestions();
})();
</script>
</body>
</html>
